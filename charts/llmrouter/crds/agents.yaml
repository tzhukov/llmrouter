apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.llmrouter.io
spec:
  group: llmrouter.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                routing:
                  type: object
                  properties:
                    strategy:
                      type: string
                    failover:
                      type: boolean
                    retries:
                      type: integer
                providers:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                      base_url:
                        type: string
                      api_key:
                        type: string
                      weight:
                        type: integer
                      prompt_price:
                        type: number
                      completion_price:
                        type: number
                      params:
                        type: object
                        additionalProperties:
                          type: string
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames:
      - ag
