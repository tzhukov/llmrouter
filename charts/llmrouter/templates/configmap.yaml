{{- if .Values.config.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llmrouter.configMapName" . }}
data:
  config.yaml: |
{{- if .Values.config.agents }}
    agents:
{{ toYaml .Values.config.agents | indent 6 }}
{{- else }}
    routing:
{{ toYaml .Values.config.routing | indent 6 }}
    providers:
{{ toYaml .Values.config.providers | indent 6 }}
{{- end }}
{{- end }}
