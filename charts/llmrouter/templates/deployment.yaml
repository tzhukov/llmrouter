apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmrouter.fullname" . }}
  labels:
    {{- include "llmrouter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmrouter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "llmrouter.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          env:
            - name: CONFIG_PATH
              value: "/etc/llmrouter/config.yaml"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmrouter.fullname" . }}-secrets
                  key: GROQ_API_KEY
          volumeMounts:
            - name: config-volume
              mountPath: /etc/llmrouter
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "llmrouter.configMapName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
