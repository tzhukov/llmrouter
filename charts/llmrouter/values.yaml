replicaCount: 1

image:
  repository: llmrouter
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  create: true
  existingConfigMapName: ""
  hotReload: true
  source: "file" # or "remote"
  agents:
    default:
      routing:
        strategy: "latency"
        failover: true
        retries: 3
      providers:
        - name: mock-fast
          type: mock
          prompt_price: 0.05
        - name: mock-cheap
          type: mock
          prompt_price: 0.01

configServer:
  enabled: false
  replicaCount: 3
  image:
    repository: llm-config-server
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

secrets:
  groqApiKey: ""
