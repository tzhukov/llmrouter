replicaCount: 1

image:
  repository: llmrouter
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  create: true
  existingConfigMapName: ""
  hotReload: true
  agents:
    default:
      routing:
        strategy: "latency"
        failover: true
        retries: 3
      providers:
        - name: mock-fast
          type: mock
          prompt_price: 0.05
        - name: mock-cheap
          type: mock
          prompt_price: 0.01
