name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: llmrouter-kind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run golangci-lint
        run: golangci-lint run

  test:
    name: Test
    runs-on: llmrouter-kind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install make
        run: |
          if ! command -v make >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y make
          fi
      - name: Run Tests
        run: make test

  bench:
    name: Benchmark
    runs-on: llmrouter-kind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install make
        run: |
          if ! command -v make >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y make
          fi
      - name: Run Benchmarks
        run: make bench
